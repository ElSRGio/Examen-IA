version: '3.8'

services:
  backend:
    build:
      context: ./server
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/pos_db
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - db
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  db:
    image: mongo:7
    container_name: pos-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  mongo-data:
